#cloud-config
package_update: true
package_upgrade: true
packages:
    - git
    - curl
    - python3-pip

runcmd:
    - curl -fsSL https://get.docker.com -o get-docker.sh
    - sh get-docker.sh
    - usermod -aG docker azureuser

    - git clone -b feature/GitOps https://github.com/kovalets-vlad/open-data-ai-analytics.git /home/azureuser/app
    - cd /home/azureuser/app

    - echo "POSTGRES_USER=postgres" > .env
    - echo "POSTGRES_PASSWORD=admin" >> .env
    - echo "POSTGRES_DB=equipment_db" >> .env
    - echo "POSTGRES_HOST=db" >> .env
    - echo "POSTGRES_PORT=5432" >> .env
    - echo "DATABASE_URL=postgresql://postgres:admin@db:5432/equipment_db" >> .env
    - echo "GRAFANA_USER=admin" >> .env
    - echo "GRAFANA_PASSWORD=DevOps_Grafana_20!" >> .env

    - pip3 install pandas requests
    - mkdir -p data/raw
    - python3 scripts/get_data.py
    - cp open-data-ai-analytics/data/raw/equipment_data.csv ./data/raw/ || true

    - docker compose up -d --build

    - cd /home/azureuser/app/monitoring
    - docker compose -f docker-compose.monitoring.yml up -d

    - curl -sfL https://get.k3s.io | sh -
    - sleep 20

    - mkdir -p /root/.kube
    - ln -s /etc/rancher/k3s/k3s.yaml /root/.kube/config
    - chmod 644 /etc/rancher/k3s/k3s.yaml

    - kubectl create namespace argocd
    - kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

    - kubectl patch svc argocd-server -n argocd -p '{"spec":{"type":"NodePort"}}'

    - echo "Waiting for Argo CD CRDs..."
    - until kubectl get crd applications.argoproj.io; do sleep 5; done

    - /usr/local/bin/kubectl apply -f /home/azureuser/open-data-ai-analytics/gitops/argocd/application.yaml -n argocd
