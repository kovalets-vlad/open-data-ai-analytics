name: CI Pipeline (Self-hosted)

on:
    workflow_dispatch:

jobs:
    local_analysis:
        runs-on: [self-hosted, windows]

        steps:
            - name: Завантаження коду
              uses: actions/checkout@v4

            - name: Налаштування Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Встановлення залежностей (PowerShell синтаксис)
              run: |
                  python -m pip install --upgrade pip
                  if (Test-Path requirements.txt) { pip install -r requirements.txt }

            - name: Запуск локального аналізу
              run: |
                  # Створюємо папку в стилі Windows
                  New-Item -ItemType Directory -Force -Path "artifacts\analysis"

                  # Спочатку качаємо дані
                  python scripts\get_data.py

                  # Потім запускаємо аналіз і пишемо лог
                  python src\sample_analysis.py > artifacts\analysis\run.log 2>&1

            - name: Збереження результатів
              uses: actions/upload-artifact@v4
              with:
                  name: local-analysis-results
                  path: artifacts\analysis
