name: Docker CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare raw data
              run: |
                  mkdir -p data/raw
                  # Спробуємо знайти ваш скрипт завантаження, де б він не був
                  find . -name "get_data.py" -exec python {} \; || echo "get_data.py не знайдено"

            - name: Create .env
              run: |
                  echo "POSTGRES_USER=postgres" >> .env
                  echo "POSTGRES_PASSWORD=admin" >> .env
                  echo "POSTGRES_DB=equipment_db" >> .env
                  echo "POSTGRES_HOST=db" >> .env
                  echo "POSTGRES_PORT=5432" >> .env
                  echo "DATABASE_URL=postgresql://postgres:admin@db:5432/equipment_db" >> .env

            - name: Run Data Pipeline
              run: |
                  docker compose up --build data_load data_quality_analysis data_research visualization --abort-on-container-exit

            - name: Check Container Logs
              if: always()
              run: |
                  echo "--- LOGS: DATA LOAD ---"
                  docker logs module_data_load || true
                  echo "--- LOGS: QUALITY ANALYSIS ---"
                  docker logs module_data_quality || true
                  echo "--- LOGS: RESEARCH ---"
                  docker logs module_data_research || true
                  echo "--- LOGS: VISUALIZATION ---"
                  docker logs module_visualization || true

            - name: Extract artifacts
              if: always()
              run: |
                  mkdir -p final_results

                  # Шукаємо ID
                  ID_Q=$(docker ps -aqf "name=module_data_quality")
                  ID_R=$(docker ps -aqf "name=module_data_research")
                  ID_V=$(docker ps -aqf "name=module_visualization")

                  echo "ID контейнерів: $ID_Q, $ID_R, $ID_V"

                  # Крок розпачу: шукаємо .json та .png файли ПО ВСЬОМУ контейнеру і копіюємо їх
                  echo "Шукаємо та копіюємо файли..."
                  docker exec $ID_Q find /app -name "*.json" -exec docker cp $ID_Q:{} ./final_results/ \; || true
                  docker exec $ID_R find /app -name "*.json" -exec docker cp $ID_R:{} ./final_results/ \; || true
                  docker exec $ID_V find /app -name "*.png" -exec docker cp $ID_V:{} ./final_results/ \; || true

                  # Традиційне копіювання (про всяк випадок)
                  docker cp $ID_Q:/app/reports/. ./final_results/ || echo "No reports in Quality"
                  docker cp $ID_R:/app/reports/. ./final_results/ || echo "No reports in Research"
                  docker cp $ID_V:/app/plots/. ./final_results/ || echo "No plots in Visual"

                  echo "--- ФІНАЛЬНИЙ СПИСОК ФАЙЛІВ ПЕРЕД ЗАВАНТАЖЕННЯМ ---"
                  ls -R ./final_results
                  echo "------------------------------------------------"

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: analytics-docker-results
                  path: final_results/
