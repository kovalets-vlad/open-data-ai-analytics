name: Docker CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare raw data
              run: |
                  mkdir -p data
                  if [ -f scripts/get_data.py ]; then python scripts/get_data.py; fi

            - name: Create dummy .env file
              run: |
                  echo "POSTGRES_USER=postgres" >> .env
                  echo "POSTGRES_PASSWORD=admin" >> .env
                  echo "POSTGRES_DB=equipment_db" >> .env
                  echo "POSTGRES_HOST=db" >> .env
                  echo "POSTGRES_PORT=5432" >> .env
                  echo "DATABASE_URL=postgresql://postgres:admin@db:5432/equipment_db" >> .env

            - name: Run Data Pipeline via Docker
              run: |
                  docker compose up --build data_load data_quality_analysis data_research visualization --abort-on-container-exit

            - name: Extract artifacts directly from containers
              run: |
                  # Створюємо локальні папки для результатів
                  mkdir -p final_results/quality_reports
                  mkdir -p final_results/research_reports
                  mkdir -p final_results/all_plots

                  # Знаходимо ТОЧНІ ID контейнерів (навіть зупинених)
                  ID_QUALITY=$(docker compose ps -qa data_quality_analysis)
                  ID_RESEARCH=$(docker compose ps -qa data_research)
                  ID_VISUAL=$(docker compose ps -qa visualization)

                  echo "Знайдені ID: Якість=$ID_QUALITY, Дослідження=$ID_RESEARCH, Візуал=$ID_VISUAL"

                  # Копіюємо вміст папок (символ /. означає "скопіюй те, що всередині")
                  docker cp ${ID_QUALITY}:/app/reports/. ./final_results/quality_reports/
                  docker cp ${ID_RESEARCH}:/app/reports/. ./final_results/research_reports/
                  docker cp ${ID_VISUAL}:/app/plots/. ./final_results/all_plots/

                  # Показуємо в логах структуру того, що дістали
                  echo "--- ЩО МИ ДІСТАЛИ З ДОКЕРУ: ---"
                  ls -R ./final_results
                  echo "--------------------------------"

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: analytics-docker-results
                  path: final_results/
