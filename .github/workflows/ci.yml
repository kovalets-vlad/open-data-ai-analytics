name: Docker CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare raw data
              run: |
                  mkdir -p data
                  if [ -f scripts/get_data.py ]; then python scripts/get_data.py; fi
            - name: Create dummy .env file
              run: |
                  echo "POSTGRES_USER=postgres" >> .env
                  echo "POSTGRES_PASSWORD=admin" >> .env
                  echo "POSTGRES_DB=equipment_db" >> .env
                  echo "POSTGRES_HOST=db" >> .env
                  echo "POSTGRES_PORT=5432" >> .env
                  echo "DATABASE_URL=postgresql://postgres:admin@db:5432/equipment_db" >> .env

            - name: Run Data Pipeline via Docker
              run: |
                  docker compose -p my_project up --build data_load data_quality_analysis data_research visualization --abort-on-container-exit

            - name: Extract artifacts directly from containers
              run: |
                  mkdir -p final_results

                  # Копіюємо файли. Додаємо || true, щоб пайплайн не впав, якщо папка пуста
                  docker cp module_data_quality:/app/reports ./final_results/quality_reports || true
                  docker cp module_data_research:/app/reports ./final_results/research_reports || true
                  docker cp module_visualization:/app/plots ./final_results/all_plots || true

                  # НАЙГОЛОВНІШЕ: Друкуємо структуру того, що дістали!
                  echo "--- ЩО МИ ДІСТАЛИ З ДОКЕРУ: ---"
                  ls -R ./final_results
                  echo "--------------------------------"

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: analytics-docker-results
                  path: final_results/
