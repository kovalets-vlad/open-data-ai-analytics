name: Docker CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare raw data
              run: |
                  python scripts/get_data.py
                  echo "=== DATA CHECK ==="
                  ls -R data

            - name: Create .env
              run: |
                  echo "POSTGRES_USER=postgres" >> .env
                  echo "POSTGRES_PASSWORD=admin" >> .env
                  echo "POSTGRES_DB=equipment_db" >> .env
                  echo "POSTGRES_HOST=db" >> .env
                  echo "POSTGRES_PORT=5432" >> .env
                  echo "DATABASE_URL=postgresql://postgres:admin@db:5432/equipment_db" >> .env

            - name: Run Data Pipeline
              run: |
                  docker compose up --build data_load data_quality_analysis data_research visualization --abort-on-container-exit

            - name: Check Container Logs
              if: always()
              run: |
                  echo "--- LOGS: DATA LOAD ---"
                  docker logs module_data_load || true
                  echo "--- LOGS: QUALITY ANALYSIS ---"
                  docker logs module_data_quality || true
                  echo "--- LOGS: RESEARCH ---"
                  docker logs module_data_research || true
                  echo "--- LOGS: VISUALIZATION ---"
                  docker logs module_visualization || true

            - name: Extract artifacts
              if: always()
              run: |
                  mkdir -p final_results

                  echo "=== COPY FROM VOLUMES ==="

                  docker run --rm \
                      -v reports_data:/reports \
                      -v $(pwd)/final_results:/out \
                      alpine \
                      sh -c "cp -r /reports/* /out/ || true"

                  docker run --rm \
                      -v plots_data:/plots \
                      -v $(pwd)/final_results:/out \
                      alpine \
                      sh -c "cp -r /plots/* /out/ || true"

                  echo "=== FINAL FILES ==="
                  ls -R final_results || true

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: analytics-docker-results
                  path: final_results/
