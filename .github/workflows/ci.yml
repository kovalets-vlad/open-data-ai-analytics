name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch: # Дозволяє запускати вручну кнопкою

jobs:
    # --- JOB 1: Завантаження даних ---
    download_data:
        runs-on: ubuntu-latest
        steps:
            - name: Завантаження коду
              uses: actions/checkout@v4

            - name: Налаштування Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Встановлення залежностей
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Запуск скрипта завантаження
              run: |
                  # Запускаємо твій перший файл
                  python -m download_data

            - name: Збереження завантаженого датасету
              uses: actions/upload-artifact@v4
              with:
                  name: raw-dataset
                  # ТУТ ВАЖЛИВО: вкажи шлях, куди твій download_data.py зберігає csv файл
                  path: open-data-ai-analytics/data/raw/

    # --- JOB 2: Аналіз даних ---
    analysis:
        needs: download_data # ВАЖЛИВО: Цей крок чекає на успішне завершення першого
        runs-on: ubuntu-latest
        steps:
            - name: Завантаження коду
              uses: actions/checkout@v4

            - name: Отримання датасету з попереднього кроку
              uses: actions/download-artifact@v4
              with:
                  name: raw-dataset
                  path: open-data-ai-analytics/data/raw/

            - name: Налаштування Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Встановлення залежностей
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Запуск аналізу
              run: |
                  mkdir -p artifacts/analysis
                  # Запускаємо другий файл і зберігаємо текстовий вивід у лог
                  python -m analysis > artifacts/analysis/run.log 2>&1

            - name: Збереження результатів аналізу
              uses: actions/upload-artifact@v4
              with:
                  name: analysis-results
                  path: artifacts/analysis
