name: CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

jobs:
    # --- JOB 1: Завантаження даних ---
    download_data:
        runs-on: ubuntu-latest
        steps:
            - name: Завантаження коду
              uses: actions/checkout@v4

            - name: Налаштування Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Встановлення залежностей
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Запуск скрипта завантаження
              run: |
                  # Вказуємо правильний шлях до файлу в папці scripts
                  python scripts/get_data.py

            - name: Збереження завантаженого датасету
              uses: actions/upload-artifact@v4
              with:
                  name: raw-dataset
                  path: open-data-ai-analytics/data/raw/

    # --- JOB 2: Аналіз даних ---
    analysis:
        needs: download_data
        runs-on: ubuntu-latest
        steps:
            - name: Завантаження коду
              uses: actions/checkout@v4

            - name: Отримання датасету з попереднього кроку
              uses: actions/download-artifact@v4
              with:
                  name: raw-dataset
                  path: open-data-ai-analytics/data/raw/

            - name: Налаштування Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Встановлення залежностей
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Запуск аналізу
              run: |
                  mkdir -p artifacts/analysis
                  # Вказуємо правильний шлях до файлу в папці src
                  python src/sample_analysis.py > artifacts/analysis/run.log 2>&1

            - name: Збереження результатів аналізу
              uses: actions/upload-artifact@v4
              with:
                  name: analysis-results
                  path: artifacts/analysis
