name: Docker CI Pipeline

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    docker-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Prepare raw data
              run: |
                  mkdir -p data
                  if [ -f scripts/get_data.py ]; then python scripts/get_data.py; fi

            - name: Run Data Pipeline via Docker
              run: |
                  docker compose up --build data_load data_quality_analysis data_research visualization --abort-on-container-exit

            - name: Extract artifacts from Docker volumes
              run: |
                  docker run --rm -v ${{ github.workspace }}/reports:/out -v reports_data:/reports alpine cp -r /reports/. /out/
                  docker run --rm -v ${{ github.workspace }}/plots:/out -v plots_data:/plots alpine cp -r /plots/. /out/

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: analytics-docker-results
                  path: |
                      reports/
                      plots/
