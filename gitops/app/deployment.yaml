apiVersion: apps/v1
kind: Deployment
metadata:
    name: web-deployment
    namespace: ai-analytics
spec:
    replicas: 1
    selector:
        matchLabels:
            app: web-app
    template:
        metadata:
            labels:
                app: web-app
        spec:
            containers:
                - name: web-container
                  image: nginx:latest
                  ports:
                      - containerPort: 80
